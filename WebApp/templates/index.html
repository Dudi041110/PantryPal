<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>
            PantryPal
        </title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    </head>
    <body>
        <center>
            <div id="base">
                <div id="AIBG"></div>
                <img id="AI_Assistant" class="Hover" alt="AI Assistant" width="200px">
                <div id="Points_section">
                    <img id="Points" src="{{ url_for('static', filename='other_assets/Cropped_Coin.gif') }}" alt="Points" class="Hover">
                    <p id="Points_Counter"></p>
                </div>
                <button id="Shop" class="Hover">
                    <img id="Shop_img" src="{{ url_for('static', filename='other_assets/Shopping_Cart.png') }}" alt="Shop">
                </button>
                <div id="Poppup_bg">
                    <div id="Poppup" class="lround">
                        <Button id="Close_Poppup" class="Hover">
                            <img id="Close_btn" src="{{ url_for('static', filename='other_assets/Back_BTN.svg') }}" alt="Close">
                        </Button>
                        <div id="Points_section_2">
                            <img id="Points_2" src="{{ url_for('static', filename='other_assets/Cropped_Coin.gif') }}" alt="Points" class="Hover">
                            <p id="Points_Counter_2"></p>
                        </div>
                        <div id="Skin_Shop"></div>
                    </div>
                </div>
                <div id="Main">
                    <button id="Challenge">
                        <div id="Daily_Challenge" class="Hover">
                            <h1>
                                Daily Challenge
                            </h1>
                            <h2>
                                Bake a Cake
                            </h2>
                            <p>
                                1 hour
                            </p>
                            <p>
                                3,000 calories
                            </p>
                            <p>
                                +500 points
                            </p>
                            <img id="Cake" src="{{ url_for('static', filename='other_assets/Cake.png') }}" alt="Cake" width="225px">
                        </div>
                    </button>
                    <div id="Nearing_Expiry" class="Hover">
                        <h1>
                            Nearing Expiry
                        </h1>
                    </div>
                    <div id="Grocery" class="Hover">
                        <h1>
                            Grocery List
                        </h1>
                        <p>
                            Bread
                        </p>
                        <p>
                            Yogurt
                        </p>
                        <p>
                            Chicken
                        </p>
                    </div>
                </div>
            </div>
        </center>
        <script src="{{ url_for('static', filename='script.js') }}"></script>
    </body>
</html>
